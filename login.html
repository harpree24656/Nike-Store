<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="contanier-login" autocomplete="off">
        <h1 class="login-heading">Log-in</h1>
        <div class="container-login-input">
            <input type="text" placeholder="enter an email..." class="login-email login">
            <p class="output-email login-para"></p>
            <input type="password" placeholder="enter password..." class="login-password login">
            <p class="output-pass login-para"></p>
            <button class="login-btn">Sign-in</button>
        </div>
    </form>

    <script src="script.js"></script>
</body>
</html>
